name: Build Android APK

on:
  push:
    branches: [master, dev, main]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/mobile-apk.yml"
  pull_request:
    branches: [master]
    paths:
      - "packages/mobile/**"
  workflow_dispatch:

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-apks
          path: |
            packages/mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            packages/mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            packages/mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
