name: Build Android APK

on:
  push:
    branches: [master, dev, main]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/mobile-apk.yml"
  pull_request:
    branches: [master]
    paths:
      - "packages/mobile/**"
  workflow_dispatch:

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Gradle 8.12
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.12-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.12/bin" >> $GITHUB_PATH

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"
          channel: "stable"
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Create local.properties
        run: flutter config --android-sdk "$ANDROID_HOME"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Gradle wrapper
        run: |
          rm -rf android/gradlew android/gradlew.bat android/gradle/wrapper/gradle-wrapper.jar
          cd android
          gradle wrapper --gradle-version 8.12
          chmod +x gradlew

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-apks
          path: |
            packages/mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            packages/mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            packages/mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
