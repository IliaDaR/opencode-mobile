name: Build APK

on:
  push:
    branches: [master]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.x"
          channel: "stable"
          cache: true
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: opencode-apk
          path: packages/mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 90
