name: opencode_mobile
description: OpenCode Mobile — AI coding agent for Android
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  image_picker: ^1.1.0
  speech_to_text: ^6.6.0
  flutter_local_notifications: ^17.2.0
  crypto: ^3.0.6
  archive: ^3.6.1
  flutter_markdown: ^0.7.6
  sqflite: ^2.4.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.0

flutter:
  uses-material-design: true
  assets: []

flutter_launcher_icons:
  android: true
  adaptive_icon_background: "#0d1117"
  adaptive_icon_foreground: "assets/icon_foreground.png"
